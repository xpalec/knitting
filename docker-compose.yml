services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: knitting
      POSTGRES_USER: knitting
      POSTGRES_PASSWORD: knitting
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
